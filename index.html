<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Reporting Tool</title>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0d0d0d;
            --accent-purple: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --error-red: #ff4d4d;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top center, #1e1b4b 0%, #050505 100%);
            overflow: hidden;
        }

        /* TOAST DESIGN */
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 100;
            top: 30px;
            font-size: 14px;
            border: 1px solid var(--accent-purple);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px var(--accent-glow);
            transition: 0.5s ease;
            opacity: 0;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            top: 50px;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #1f1f1f;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom right, #fff 30%, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            background: #161616;
            border: 1px solid #262626;
            border-radius: 10px;
            color: white;
            outline: none;
            margin-bottom: 1.5rem;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--accent-purple);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        #status-box { display: none; margin-top: 1rem; }
        .loader-ring {
            width: 40px; height: 40px;
            border: 3px solid #161616; border-top: 3px solid var(--accent-purple);
            border-radius: 50%; margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }

        .progress-container { background: #161616; height: 6px; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--accent-purple); transition: width 0.4s; }

        .error-card {
            display: none; margin-top: 20px; background: rgba(255, 77, 77, 0.05);
            border: 1px solid rgba(255, 77, 77, 0.2); border-radius: 10px;
            padding: 15px; color: var(--error-red); font-size: 0.85rem; text-align: left;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="toast">⚠️ Please enter a valid link!</div>

<div class="container" id="tool-ui">
    <h1>Reporting Tool</h1>
    <p class="subtitle">Enter target URL to begin automation</p>

    <div id="setup-view">
        <input type="text" id="target" placeholder="https://instagram.com/target_user">
        <button onclick="execute()">Start Divine Report</button>
    </div>

    <div id="status-box">
        <div class="loader-ring"></div>
        <div class="progress-container"><div class="progress-bar" id="bar"></div></div>
        <div id="log-text" style="font-size: 0.75rem; color: var(--accent-purple);">Connecting...</div>
    </div>

    <div id="error-view" class="error-card">
        <strong>⚠️ CRITICAL_SYSTEM_FAILURE</strong><br>
        Reason: Insufficient System Resources.<br>
        Memory Leak detected at block 0x882.
    </div>
</div>

<script>
    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function execute() {
        const target = document.getElementById('target').value;
        if(!target) {
            showToast("⚠️ Link is required to start!");
            return;
        }

        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('status-box').style.display = 'block';

        let p = 0;
        const bar = document.getElementById('bar');
        const timer = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 2;
            bar.style.width = p + "%";
            if(p >= 45) {
                clearInterval(timer);
                setTimeout(() => {
                    document.getElementById('status-box').style.display = 'none';
                    document.getElementById('error-view').style.display = 'block';
                }, 500);
            }
        }, 400);
    }
</script>

</body>
</html>
